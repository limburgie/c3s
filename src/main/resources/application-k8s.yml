c3s:
  siteassetstore:
    cache:
      enabled: ${ASSET_STORE_CACHE_ENABLED:true}
      max-entries: ${ASSET_STORE_CACHE_MAX_ENTRIES:1000}
      webhook:
        secret: ${ASSET_STORE_CACHE_WEBHOOK_SECRET}
  recaptcha:
    key: ${RECAPTCHA_KEY}

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: ${DB_DRIVER}
  jpa.properties.hibernate.dialect: ${DB_DIALECT}

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
  endpoint:
    health:
      probes:
        enabled: true