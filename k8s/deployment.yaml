apiVersion: apps/v1
kind: Deployment
metadata:
  name: c3s
  namespace: c3s
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: c3s
  template:
    metadata:
      labels:
        app: c3s
    spec:
      # Spread replicas across nodes so a node failure doesn't take both down
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: c3s
      containers:
        - name: c3s
          # Image tag will be set by CI; this is a placeholder for first apply
          image: registry.digitalocean.com/web-factor-container-registry/c3s:placeholder
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: c3s-config
            - secretRef:
                name: c3s-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 300
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 5
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 10"]
      terminationGracePeriodSeconds: 45